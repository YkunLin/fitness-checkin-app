<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健身训练打卡</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">Workout Tracker</p>
        <h1>健身训练打卡</h1>
        <p class="subtitle">记录每一天的训练，坚持就是进步。</p>
      </div>
      <div class="streak-card">
        <span>连续打卡</span>
        <strong id="streak-count">0 天</strong>
      </div>
    </header>

    <section class="card date-section">
      <label for="workout-date">训练日期</label>
      <input type="date" id="workout-date" />
    </section>

    <section class="summary-grid">
      <article class="summary-card">
        <span>训练动作</span>
        <strong id="exercise-count">0</strong>
      </article>
      <article class="summary-card">
        <span>总组数</span>
        <strong id="total-sets">0</strong>
      </article>
      <article class="summary-card">
        <span>总次数</span>
        <strong id="total-reps">0</strong>
      </article>
    </section>

    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">TODAY'S WORKOUT</p>
          <h2>今日训练</h2>
        </div>
        <button id="add-exercise-btn" class="secondary-btn">＋ 添加动作</button>
      </div>

      <div id="exercise-list" class="exercise-list"></div>

      <div class="actions">
        <button id="save-btn" class="primary-btn">保存今日打卡</button>
        <button id="clear-btn" class="danger-btn">清空今日记录</button>
      </div>
      <p id="save-message" class="save-message" aria-live="polite"></p>
    </section>

    <section class="card history-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">HISTORY</p>
          <h2>最近记录</h2>
        </div>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <template id="exercise-template">
    <article class="exercise-item">
      <div class="exercise-top">
        <input class="exercise-name" type="text" placeholder="动作名称，例如：俯卧撑" />
        <button class="remove-btn" type="button" aria-label="删除动作">×</button>
      </div>
      <div class="exercise-fields">
        <label>
          <span>组数</span>
          <input class="sets-input" type="number" min="0" value="0" />
        </label>
        <label>
          <span>每组次数</span>
          <input class="reps-input" type="number" min="0" value="0" />
        </label>
        <div class="exercise-total">
          <span>总次数</span>
          <strong class="item-total">0</strong>
        </div>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
